name: Feature request
description: Sugerir uma nova feature ou melhoria
title: '[feat]: '
labels: ['type:enhancement', 'needs-triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: Qual problema essa feature resolve?
      description: Descreva o caso de uso real, não a solução.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposta
      description: Como você imaginaria que isso funcionasse? UI, API, comportamento.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
  - type: dropdown
    id: area
    attributes:
      label: Área principal afetada
      options:
        - 'area:web (canvas, editor, UI)'
        - 'area:api (backend NestJS)'
        - 'area:ir (IR canônica e Ops)'
        - 'area:hcl (parser/emitter)'
        - 'area:resources (catálogo multi-cloud)'
        - 'area:templates (patterns prontos)'
        - 'area:ui (design system)'
        - 'area:infra (docker, CI, deploy)'
        - 'area:docs'
        - 'area:multi (cross-cutting)'
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Fase do roadmap em que faria sentido
      options: [F0, F1, F2, F3, F4, F5, F6, Pós-MVP, Não sei]
    validations:
      required: true
  - type: dropdown
    id: effort
    attributes:
      label: Esforço estimado (chute inicial — triagem ajusta)
      options:
        - 'effort:XS (menos de 1h)'
        - 'effort:S (1–4h)'
        - 'effort:M (4–8h)'
        - 'effort:L (1–3 dias)'
        - 'effort:XL (mais de 3 dias)'
        - Não sei
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmações
      options:
        - label: Procurei nas issues/discussions existentes.
          required: true
        - label: Li o ROADMAP.md e os ADRs em `docs/adr/` que parecem relevantes.
          required: true
