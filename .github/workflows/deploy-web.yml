name: Deploy Web (Vercel)

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/ir/**'
      - 'packages/hcl/**'
      - 'packages/resources/**'
      - 'packages/templates/**'
      - 'packages/ui/**'
      - 'packages/config/**'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Pull Vercel env
        run: pnpm dlx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
      - name: Build
        run: pnpm dlx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
      - name: Deploy
        run: pnpm dlx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
