name: cloud-blueprint

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blueprint
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d blueprint']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional: Postgres GUI for local dev. Run with `--profile tools`.
  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ['tools']

  # Optional: open-source Infracost CLI (Apache 2.0) for cost estimation.
  # Run with `docker compose --profile cost up infracost` or
  # `pnpm infra:up:cost`.
  #
  # The container is a long-running shell so the API can `docker exec` into
  # it on demand instead of spinning up a fresh container per estimate.
  # We mount a writable tmp dir for staged HCL files and pin the version
  # so reproducibility matches what CI runs.
  #
  # No Infracost API key required for public AWS/Azure/GCP pricing — the
  # container ships an embedded price database. Remove the env block if
  # you do *not* want telemetry pinged to Infracost; we already disable it
  # via `INFRACOST_SELF_HOSTED_ENDPOINT`.
  infracost:
    image: infracost/infracost:ci-0.10
    restart: unless-stopped
    entrypoint: ['sh', '-c']
    command: ['mkdir -p /workspace && tail -f /dev/null']
    environment:
      INFRACOST_SKIP_UPDATE_CHECK: 'true'
      INFRACOST_NO_COLOR: 'true'
      INFRACOST_LOG_LEVEL: 'warn'
    volumes:
      - infracost-workspace:/workspace
    profiles: ['cost']

volumes:
  postgres-data:
  redis-data:
  infracost-workspace:
