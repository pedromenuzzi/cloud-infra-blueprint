<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Blueprint — Design cloud infrastructure visually. Ship Terraform instantly.</title>
    <meta
      name="description"
      content="Free, open-source blueprint editor that keeps your architecture diagram and your Terraform code in perfect sync. AWS, Azure, and GCP. Runs entirely in your browser."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Anti-flash: apply theme before React mounts.
      (function () {
        try {
          var t = localStorage.getItem('cb-theme') || 'system';
          var dark =
            t === 'dark' ||
            (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
